exclude: ^\.local_pkgs/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-json
      - id: detect-private-key
        exclude: ^docs/configuration\.md$

  - repo: https://github.com/crate-ci/typos
    rev: b859c0df7f391deba73030f79b957e62b4d81dc6  # varcon-core-v5.0.7
    hooks:
      - id: typos
        # The changelog is auto-generated by towncrier; its issue reference
        # links contain hyphen-separated truncated words in ticket slugs that
        # typos consistently flags as false positives.
        exclude: ^CHANGELOG\.md$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy src/ --strict
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: uv-audit
        name: uv audit
        entry: uv audit
        # CVE-2025-69872 / GHSA-w8v5-vhqr-4h9v: diskcache unsafe pickle deserialization.
        # No fix version available; ignored until a patched release is published.
        args: ["--ignore-until-fixed", "GHSA-w8v5-vhqr-4h9v"]
        language: system
        pass_filenames: false
        files: ^uv\.lock$

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: local
    hooks:
      - id: vulture
        name: vulture
        # --min-confidence 80 drops noisy 60% findings (dynamically-set
        # dunders on built tool functions, pydantic model fields) that are
        # false positives; genuine dead code reports at 90%+.
        entry: vulture src/ vulture_whitelist.py --min-confidence 80
        language: system
        pass_filenames: false

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: ["--fix"]
        types: [markdown]

  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: ["--number", "--wrap", "100"]
        # CHANGELOG.md is generated by the auto-release workflow (towncrier)
        # and never edited by hand (repo baseline); reformatting it here
        # turns every release commit into a red main.
        exclude: ^CHANGELOG\.md$
        additional_dependencies:
          - mdformat-gfm
          - mdformat-frontmatter
