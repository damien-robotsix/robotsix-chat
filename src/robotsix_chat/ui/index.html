<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="project-title" content="{{ PROJECT_TITLE }}">
<title>{{ PROJECT_TITLE }} — Chat</title>
<meta name="idle-timeout-minutes" content="{{ IDLE_TIMEOUT_MINUTES }}">
<link rel="stylesheet" href="/static/chat.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
</head>
<body>

<!-- ================================================================= -->
<!-- Header                                                             -->
<!-- ================================================================= -->
<header id="header">
  <span class="title">{{ PROJECT_TITLE }}</span>
  <button id="sessions-toggle" class="header-btn" title="Show your chat sessions" aria-label="Chat sessions">💬 Chats</button>
  <span id="connection-dot" title="Connection status"></span>
  <button id="subsessions-toggle" class="header-btn" title="Show background subsessions" aria-label="Subsessions">🗂 Subsessions</button>
</header>

<!-- ================================================================= -->
<!-- Sessions panel (left sidebar)                                      -->
<!-- ================================================================= -->
<div id="sessions-resize-handle"></div>
<div id="sessions-panel" class="visible">
  <div class="sessions-header panel-header">
    <span>Sessions</span>
    <button class="dismiss" title="Close panel" aria-label="Close sessions panel">&times;</button>
  </div>
  <button id="new-chat-btn" title="Start a new chat session">+ New chat</button>
  <div id="sessions-list"></div>
</div>

<!-- ================================================================= -->
<!-- Subsessions panel (right sidebar)                                  -->
<!-- ================================================================= -->
<div id="subsessions-resize-handle"></div>
<div id="subsessions-panel">
  <div class="subs-header panel-header">
    Subsessions
    <div class="subs-header-actions">
      <button id="subs-toggle-terminal" class="toggle-terminal" style="display:none" title="Show closed/failed subsessions" aria-label="Toggle closed/failed subsessions"></button>
      <button class="dismiss" title="Close panel" aria-label="Close subsessions panel">&times;</button>
    </div>
  </div>
  <div id="subsessions-list"></div>
</div>

<!-- ================================================================= -->
<!-- Content wrapper (chat + preview + composer)                        -->
<!-- ================================================================= -->
<div id="content-wrap">

<!-- ================================================================= -->
<!-- Error banner                                                       -->
<!-- ================================================================= -->
<div id="error-banner">
  <span class="msg"></span>
  <button class="dismiss" title="Dismiss" aria-label="Dismiss error">&times;</button>
</div>

<!-- ================================================================= -->
<!-- Chat messages                                                      -->
<!-- ================================================================= -->
<div id="summary-container"></div>
<div id="chat" aria-live="polite"></div>

<!-- ================================================================= -->
<!-- Preview tray                                                       -->
<!-- ================================================================= -->
<div id="preview-tray" aria-label="Image attachments"></div>
<div id="attach-error" aria-live="polite"></div>

<!-- ================================================================= -->
<!-- Composer                                                           -->
<!-- ================================================================= -->
<div id="composer">
  <textarea id="msg-input" rows="1" placeholder="Type a message…" aria-label="Message"></textarea>
  <button id="attach-btn" title="Attach images" aria-label="Attach images">📎</button>
  <button id="send-btn" title="Send message (Enter)">Send</button>
  <input type="file" id="file-input" accept="image/png,image/jpeg,image/gif,image/webp" multiple style="display:none">
  <button id="cancel-queued-btn" title="Cancel all queued messages" style="display:none">Cancel queued</button>
</div>

</div><!-- end #content-wrap -->

<script src="/static/chat.js"></script>

</body>
</html>
