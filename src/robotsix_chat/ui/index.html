    } else if (currentWidth < 220) {
      sessionsPanel.style.width = "220px";
    }
    positionSessionsResizeHandle();
  });

  // ---- Tasks panel toggle — no auto-close on outside click (unlike settings).
  var tasksDismiss = tasksPanel.querySelector(".dismiss");
  tasksToggle.addEventListener("click", function (e) {
    e.stopPropagation();
    var opening = !tasksPanel.classList.contains("visible");
    tasksPanel.classList.toggle("visible");
    if (opening) positionResizeHandle();
    else hideResizeHandle();
  });

  tasksDismiss.addEventListener("click", function (e) {
    e.stopPropagation();
    tasksPanel.classList.remove("visible");
    hideResizeHandle();
  });

  tasksPanel.addEventListener("click", function (e) {
    e.stopPropagation();
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && tasksPanel.classList.contains("visible")) {
      tasksPanel.classList.remove("visible");
      hideResizeHandle();
    }
  });

  // ---- Resize handle for tasks panel ----------------------------------
  var resizeDragging = false;
  var resizeStartX = 0;
  var resizeStartWidth = 0;

  function positionResizeHandle() {
    var rect = tasksPanel.getBoundingClientRect();
    tasksResizeHandle.style.display = "block";
    tasksResizeHandle.style.left = rect.left + "px";
  }

  function hideResizeHandle() {
    tasksResizeHandle.style.display = "none";
  }

  tasksResizeHandle.addEventListener("mousedown", function (e) {
    e.preventDefault();
    resizeDragging = true;
    resizeStartX = e.clientX;
    resizeStartWidth = tasksPanel.getBoundingClientRect().width;
    tasksResizeHandle.classList.add("active");
    document.body.style.userSelect = "none";
  });

  document.addEventListener("mousemove", function (e) {
    if (!resizeDragging) return;
    var dx = resizeStartX - e.clientX;
    var newWidth = resizeStartWidth + dx;
    newWidth = Math.max(260, Math.min(newWidth, window.innerWidth * 0.9));
    tasksPanel.style.width = newWidth + "px";
    positionResizeHandle();
  });

  document.addEventListener("mouseup", function () {
    if (!resizeDragging) return;
    resizeDragging = false;
    tasksResizeHandle.classList.remove("active");
    document.body.style.userSelect = "";
    positionResizeHandle();
  });

  window.addEventListener("resize", function () {
    if (!tasksPanel.classList.contains("visible")) return;
    // Re-clamp the panel width so it doesn't overflow the viewport after
    // a browser window resize.  The inline width set during drag can
    // override the CSS max-width, so we re-apply the clamp here.
    var currentWidth = tasksPanel.getBoundingClientRect().width;
    var maxWidth = window.innerWidth * 0.9;
    if (currentWidth > maxWidth) {
      tasksPanel.style.width = maxWidth + "px";
    } else if (currentWidth < 260) {
      tasksPanel.style.width = "260px";
    }
    positionResizeHandle();
  });

  // ---- Initial state ---------------------------------------------------
  setConnectionStatus(true);  // optimistic green; turns red on first error

  // Bootstrap: fetch sessions, pick the active one, then load history/events.
  fetchSessions().then(function (data) {
    // Determine active session: server-reported active, or newest, or local fallback.
    var sid = data.active_session_id;
    if (!sid && data.sessions && data.sessions.length > 0) {
      sid = data.sessions[0].session_id;
    }
    var localSid = getActiveSessionId();
    if (localSid && data.sessions) {
      // If the locally stored session still exists on the server, prefer it.
      for (var i = 0; i < data.sessions.length; i++) {
        if (data.sessions[i].session_id === localSid) {
          sid = localSid;
          break;
        }
      }
    }
    if (sid) {
      setActiveSessionId(sid);
    }
    renderSessionList(data);
    loadHistory();
    loadLoops();
    loadPendingQuestions();
    openEventStream();
    resetIdleTimer();
  }).catch(function () {
    // If sessions endpoint is unavailable, fall back to local active session.
    var localSid = getActiveSessionId();
    if (localSid) {
      setActiveSessionId(localSid);
    } else {
      // Last resort: use clientId as a fallback session_id for backwards compat.
      setActiveSessionId(clientId);
    }
    loadHistory();
    loadLoops();
    loadPendingQuestions();
    openEventStream();
    resetIdleTimer();
  });
})();
</script>

</body>
</html>
