# Local build-and-run compose stack for robotsix-chat (dev only — the
# deployment system ignores this file; deploy/docker-compose.yml is the
# production contract).
#
# Prerequisites before first run:
#   1. cp config/config.json config/config.local.json
#      then edit config.local.json: set server_host to "0.0.0.0" and
#      server_port to 8080 so the published port below reaches the server,
#      and fill any credentials you need.
#   2. claude login   (populates ~/.claude for subscription auth)
#
# Then: docker compose up --build

services:
  chat:
    build:
      context: .
      dockerfile: Dockerfile
    image: robotsix-chat:local
    container_name: robotsix-chat
    ports:
      - "8080:8080"
    environment:
      # Infrastructure wiring only (config standard): locates the mounted
      # config file. All settings and secrets live in that file.
      ROBOTSIX_CONFIG_FILE: /home/app/config/config.json
    volumes:
      - ./config/config.local.json:/home/app/config/config.json:ro
      - ~/.claude:/home/app/.claude:ro
    restart: unless-stopped
