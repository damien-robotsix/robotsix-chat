site_name: robotsix-chat
site_description: Browser + SSE chat server exposing an LLM agent to human users
repo_url: https://github.com/damien-robotsix/robotsix-chat

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
      - Configuration: configuration.md
      - Periodic Checks: periodic-checks.md
      - Deployment: user-guide/deployment.md
  - API Reference:
      - robotsix_chat: api/robotsix_chat.md
      - robotsix_chat.config: api/robotsix_chat/config.md
      - robotsix_chat.chat.server: api/robotsix_chat/server.md
      - robotsix_chat.llm.agent: llm/agent.md
      - robotsix_chat.memory: memory/api.md
  - Changelog: changelog.md
  - Contributing: contributing.md
