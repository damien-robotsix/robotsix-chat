      - tests/skills/test_spec.py
      - tests/skills/test_loader.py
      - tests/skills/test_broker_skill.py
      - tests/skills/test_init.py

  - id: robotsix_chat.ui
    description: "Browser chat UI — self-contained HTML frontend served at /."
    paths:
      - src/robotsix_chat/ui/index.html

  - id: robotsix_chat.version_check
    description: "Self-version-check tool for the agent — compares the running robotsix_chat.__version__ against the latest published GitHub release and warns the user when the deployment is behind."
    paths:
      - src/robotsix_chat/version_check/__init__.py
      - src/robotsix_chat/version_check/client.py
      - tests/version_check/__init__.py
      - tests/version_check/test_version_check.py
