# docs/modules.yaml — module manifest for the robotsix-chat repository.
#
# This file is maintained by the module_curator periodic workflow.  It maps
# every importable Python namespace under ``src/robotsix_chat/`` to its
# purpose (sourced from the module docstring) and the repo-relative file
# paths that belong to it.
#
# Format:
#   modules:
#     - id: <dotted module name>
#       description: <one-line summary from the module docstring>
#       paths:
#         - <repo-relative path>
#
# Non-Python resources that ship inside a package (e.g. ``ui/index.html``)
# are listed under the owning module so the curator does not flag them as
# unclassified orphans.

modules:
  - id: robotsix_chat
    description: "Top-level package — browser + SSE chat server for an LLM agent."
    paths:
      - src/robotsix_chat/__init__.py
      - src/robotsix_chat/py.typed
      - tests/__init__.py
      - tests/conftest.py
      - tests/test_smoke.py

  - id: robotsix_chat.board_reader
    description: "Direct HTTP read access to the mill's board API — exposes build_board_reader_tools() that let the assistant list and read tickets from the same HTTP endpoint the user's browser UI consumes."
    paths:
      - src/robotsix_chat/board_reader/__init__.py
      - src/robotsix_chat/board_reader/client.py
      - tests/board_reader/__init__.py
      - tests/board_reader/test_board_reader.py

  - id: robotsix_chat.broker_client
    description: "Shared base for brokered agent-comm clients — lazy import, common __init__ pattern, and thread-offloaded consult()."
    paths:
      - src/robotsix_chat/broker_client.py
      - tests/test_broker_client.py

  - id: robotsix_chat.calendar
    description: "Calendar/tasks integration over the agent-comm broker — exposes build_calendar_tools() for querying and managing the user's calendar and tasks in natural language."
    paths:
      - src/robotsix_chat/calendar/__init__.py
      - src/robotsix_chat/calendar/client.py
      - tests/calendar/__init__.py
      - tests/calendar/test_calendar.py

  - id: robotsix_chat.config
    description: "Environment-based configuration via pydantic + python-dotenv."
    paths:
      - src/robotsix_chat/config.py
      - tests/config/__init__.py
      - tests/config/test_config.py

  - id: robotsix_chat.chat
    description: "Chat SSE server — HTTP + Server-Sent Events bridge for human-to-agent chat."
    paths:
      - src/robotsix_chat/chat/__init__.py
      - src/robotsix_chat/chat/auth.py
      - src/robotsix_chat/chat/conversation.py
      - src/robotsix_chat/chat/server.py
      - src/robotsix_chat/chat/tasks.py
      - tests/chat/__init__.py
      - tests/chat/test_auth.py
      - tests/chat/test_conversation.py
      - tests/chat/test_server.py

  - id: robotsix_chat.component_agent
    description: "Component agent package — contains the config contract + validation module and the broker responder that registers this component as an embedded agent on the agent-comm broker, serving monitor, config-get, and config-set request kinds."
    paths:
      - src/robotsix_chat/component_agent/__init__.py
      - src/robotsix_chat/component_agent/config_contract.py
      - src/robotsix_chat/component_agent/responder.py
      - tests/component_agent/__init__.py
      - tests/component_agent/test_config_contract.py
      - tests/component_agent/test_responder.py

  - id: robotsix_chat.llm
    description: "LLM-powered agent — streaming wrapper around llmio.Agent."
    paths:
      - src/robotsix_chat/llm/__init__.py
      - src/robotsix_chat/llm/agent.py
      - tests/llm/__init__.py
      - tests/llm/test_agent.py

  - id: robotsix_chat.memory
    description: "Long-term memory backend — Cognee-based persistent storage for cross-conversation continuity."
    paths:
      - src/robotsix_chat/memory/__init__.py
      - src/robotsix_chat/memory/base.py
      - src/robotsix_chat/memory/cognee.py
      - tests/memory/__init__.py
      - tests/memory/test_memory.py

  - id: robotsix_chat.mill
    description: "Mill/broker integration — consult robotsix-mill's board manager via the agent-comm broker."
    paths:
      - src/robotsix_chat/mill/__init__.py
      - src/robotsix_chat/mill/client.py
      - tests/mill/__init__.py
      - tests/mill/test_mill.py

  - id: robotsix_chat.mail
    description: "Mail/broker integration — consult robotsix-auto-mail's board manager via the agent-comm broker."
    paths:
      - src/robotsix_chat/mail/__init__.py
      - src/robotsix_chat/mail/client.py
      - tests/mail/__init__.py
      - tests/mail/test_build_mail_tools.py

  - id: robotsix_chat.refdocs
    description: "Read-only reference-docs tool — lets the chat agent read team repos."
    paths:
      - src/robotsix_chat/refdocs/__init__.py
      - src/robotsix_chat/refdocs/client.py
      - tests/refdocs/__init__.py
      - tests/refdocs/test_refdocs.py
  - id: robotsix_chat.selfreview
    description: "Self-review tools — a read-only digest of live conversation activity. Exposes build_recent_activity_tools(), a factory that returns a single read_recent_activity tool that reads from the in-process ConversationStore."
    paths:
      - src/robotsix_chat/selfreview/__init__.py
      - src/robotsix_chat/selfreview/read.py
      - tests/selfreview/__init__.py
      - tests/selfreview/test_read.py
  - id: robotsix_chat.ui
    description: "Browser chat UI — self-contained HTML frontend served at /."
    paths:
      - src/robotsix_chat/ui/index.html

  - id: robotsix_chat.version_check
    description: "Self-version-check tool for the agent — compares the running robotsix_chat.__version__ against the latest published GitHub release and warns the user when the deployment is behind."
    paths:
      - src/robotsix_chat/version_check/__init__.py
      - src/robotsix_chat/version_check/client.py
      - tests/test_version_check.py
