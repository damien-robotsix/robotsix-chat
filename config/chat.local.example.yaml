# Example configuration for robotsix-chat.
#
# Copy this file to config/chat.local.yaml and fill in your real values:
#
#     cp config/chat.local.example.yaml config/chat.local.yaml
#
# config/chat.local.yaml is git-ignored so credentials never land in the
# repo. Override the path with the CHAT_CONFIG_PATH environment variable.
#
# Every value you omit falls back to its built-in default (shown commented
# below). Environment variables override the corresponding YAML value
# field-by-field.

# LLM selection — delegated to robotsix-llmio: pick a capability *level* and
# llmio resolves the provider + model for it (never a concrete provider class).
#
# Default level → provider-model identifier (llmio's baked defaults):
#   level 1 → openrouter[deepseek]-deepseek/deepseek-v4-flash  (cheapest/fastest)
#   level 2 → openrouter[deepseek]-deepseek/deepseek-v4-pro
#   level 3 → claudeSDK-opus  (most capable; keyless)
#
# Levels 1-2 use OpenRouter — install `uv sync --extra openrouter` and set
# api_key below. Level 3 uses the Claude Agent SDK — install
# `uv sync --extra claude-sdk`, run `claude login` (needs Node.js); no api_key.
llmio:
  model_level: 3                 # 1 (cheapest) | 2 | 3 (best); env: LLMIO_MODEL_LEVEL
  # api_key: sk-or-...           # required for levels 1-2 (OpenRouter); env: LLMIO_API_KEY
  # subagent_model: sonnet      # background sub-agent model (claudeSDK only): sonnet | haiku | null=match foreground; env: LLMIO_SUBAGENT_MODEL

# The LLM agent's behaviour.
agent:
  # instruction: You are a helpful assistant.   # env override: AGENT_INSTRUCTION

# HTTP/SSE server.
server:
  # host: 127.0.0.1                # env override: SERVER_HOST
  # port: 8000                     # env override: SERVER_PORT
  # log_level: INFO                # env override: LOG_LEVEL
  # Origins allowed to call /chat cross-origin (only when the UI is hosted
  # elsewhere). [] = none, ["*"] = any. Env override: CORS_ALLOW_ORIGINS
  # cors_allow_origins: []
  # correlation_id_header: X-Request-ID  # env override: CORRELATION_ID_HEADER
  # idle_timeout_minutes: 30   # 0 disables; UI auto-restarts conversation after N idle minutes. env: IDLE_TIMEOUT_MINUTES
  # max_background_tasks: 5  # max concurrent background sub-agents per process; env: MAX_BACKGROUND_TASKS
  # max_check_loops: 5  # max concurrent check loops per process; env: MAX_CHECK_LOOPS
  # min_check_loop_interval_seconds: 60.0  # min seconds between check-loop iterations; env: MIN_CHECK_LOOP_INTERVAL_SECONDS

# Login — gate the browser UI and /chat behind HTTP Basic Auth. Disabled by
# default so local runs need no credentials. Enable for any deployment that
# is reachable beyond localhost.
auth:
  enabled: false                   # env override: AUTH_ENABLED
  username: admin                  # env override: AUTH_USERNAME
  password: ""                     # required when enabled; env override: AUTH_PASSWORD

# Long-term memory (cognee) — gives the agent continuity across conversations:
# it recalls relevant memory before each reply and persists the exchange after
# (the write runs in the background, off the reply's latency path). Disabled by
# default; requires `uv sync --extra memory`. When enabled, both
# memory.llm.api_key and memory.embedding.endpoint are required.
#
# Architecture: cognee runs embedded; the extraction LLM is OpenRouter and the
# embedding model is a remote OpenAI-compatible server (self-hosted Ollama).
memory:
  enabled: false                   # env override: MEMORY_ENABLED
  # data_dir: .data/cognee         # cognee stores live here; keep on a persistent
                                   #   mount. Env override: MEMORY_DATA_DIR
  # recall_search_type: GRAPH_COMPLETION  # clean facts, +1 cheap LLM call/msg;
                                   #   CHUNKS/SUMMARIES are faster but rawer.
  llm:                             # extraction LLM (graph building / consolidation)
    # provider: custom             # env override: MEMORY_LLM_PROVIDER
    # model: openrouter/deepseek/deepseek-v4-flash   # env: MEMORY_LLM_MODEL
    # endpoint: https://openrouter.ai/api/v1         # env: MEMORY_LLM_ENDPOINT
    api_key: ""                    # OpenRouter key, required; env: MEMORY_LLM_API_KEY
  embedding:                       # remote OpenAI-compatible embedding server
    # provider: openai_compatible  # env override: MEMORY_EMBEDDING_PROVIDER
    # model: bge-m3                # env override: MEMORY_EMBEDDING_MODEL
    endpoint: ""                   # e.g. http://host:11434/v1, required; env: MEMORY_EMBEDDING_ENDPOINT
    # dimensions: 1024             # sticky — changing it invalidates stored vectors
    # api_key: ollama             # env override: MEMORY_EMBEDDING_API_KEY
    # huggingface_tokenizer: BAAI/bge-m3   # env: MEMORY_EMBEDDING_TOKENIZER

# robotsix-mill integration over the agent-comm broker. Disabled by default;
# requires `uv sync --extra broker`. When enabled, the agent gains a tool that
# forwards natural-language requests to the mill's board manager (create/triage
# tickets, ask status). Needs a broker_token registered on the broker.
mill:
  enabled: false                   # env override: MILL_ENABLED
  # broker_host: ai-broker.robotsix.net  # env: MILL_BROKER_HOST
  # broker_port: 443               # env: MILL_BROKER_PORT
  # broker_scheme: https           # env: MILL_BROKER_SCHEME
  broker_token: ""                 # this agent's bearer token; required; env: MILL_BROKER_TOKEN
  # agent_id: robotsix-chat        # this agent's id on the broker; env: MILL_AGENT_ID
  # board_manager_id: board-manager-robotsix-mill  # recipient; env: MILL_BOARD_MANAGER_ID
  # repo_id: ""                    # empty → board manager picks the repo; env: MILL_REPO_ID
  # timeout: 600                   # per-request seconds; env: MILL_TIMEOUT

# robotsix-calendar integration over the agent-comm broker. Disabled by default;
# requires `uv sync --extra broker`. When enabled, the agent gains tools that
# forward natural-language calendar and task requests to
# robotsix-calendar-agent (query schedule, create/update events, manage to-dos).
# Needs a broker_token registered on the broker.
calendar:
  enabled: false                   # env override: CALENDAR_ENABLED
  # broker_host: ai-broker.robotsix.net  # env: CALENDAR_BROKER_HOST
  # broker_port: 443               # env: CALENDAR_BROKER_PORT
  # broker_scheme: https           # env: CALENDAR_BROKER_SCHEME
  broker_token: ""                 # this agent's bearer token; required; env: CALENDAR_BROKER_TOKEN
  # agent_id: robotsix-chat        # this agent's id on the broker; env: CALENDAR_AGENT_ID
  # calendar_agent_id: calendar-agent-robotsix  # recipient; env: CALENDAR_CALENDAR_AGENT_ID
  # timeout: 240                   # per-request seconds; env: CALENDAR_TIMEOUT

# robotsix-auto-mail integration over the agent-comm broker. Disabled by default;
# requires `uv sync --extra broker`. When enabled, the agent gains a tool that
# forwards natural-language requests to the auto-mail board manager
# (board-manager-robotsix-auto-mail) — view, triage, or comment on mail-agent
# tickets from chat. Mirrors the mill / consult_mill pattern exactly.
# Needs a broker_token registered on the broker.
mail:
  enabled: false                   # env override: MAIL_ENABLED
  # broker_host: ai-broker.robotsix.net  # env: MAIL_BROKER_HOST
  # broker_port: 443               # env: MAIL_BROKER_PORT
  # broker_scheme: https           # env: MAIL_BROKER_SCHEME
  broker_token: ""                 # this agent's bearer token; required; env: MAIL_BROKER_TOKEN
  # agent_id: robotsix-chat        # this agent's id on the broker; env: MAIL_AGENT_ID
  # board_manager_id: board-manager-robotsix-auto-mail  # recipient; env: MAIL_BOARD_MANAGER_ID
  # timeout: 240                   # per-request seconds; env: MAIL_TIMEOUT

# Multi-turn conversation continuity for the browser chat. The server keys
# conversations by a per-browser id (sent automatically by the UI) and replays
# recent turns to the agent, grouping a conversation's traces under one session.
# After the idle window a fresh conversation starts (new trace, empty history),
# matching how an abandoned-then-resumed chat should behave.
conversation:
  # idle_reset_seconds: 1800       # retained for compatibility; no longer triggers
                                   #   history reset (sessions are explicit & persistent)
                                   #   env: CONVERSATION_IDLE_RESET_SECONDS
  # max_history_turns: 50          # recent turns replayed per session;
                                   #   env: CONVERSATION_MAX_HISTORY_TURNS
  # max_conversations: 1000        # tracked sessions (LRU-capped); bounds memory.
                                   #   Env override: CONVERSATION_MAX_CONVERSATIONS
  # persist_path: .data/conversations.json  # JSON persistence file; set to "" to disable.
                                   #   Env override: CONVERSATION_PERSIST_PATH

# Reference-docs tool — lets the agent read documentation from allowlisted
# team GitHub repos on demand. Primarily used to consult the board-workflow
# reference repo when deciding whether a ticket needs manual human action.
# The tool is read-only and repos outside the allowlist are refused.
refdocs:
  enabled: false                   # env override: REFDOCS_ENABLED
  # repos:                         # allowlist of owner/name repos; required when
                                   #   enabled — put the board-workflow reference
                                   #   repo here. Comma-separated in env:
                                   #   REFDOCS_REPOS (e.g. org/repo1,org/repo2)
  # ref: main                      # default git ref/branch; env: REFDOCS_REF
  # github_token: ""               # PAT for private repos; env: REFDOCS_GITHUB_TOKEN
  # base_url: https://api.github.com  # overridable for GHE; env: REFDOCS_BASE_URL
  # timeout: 30.0                  # per-request HTTP seconds; env: REFDOCS_TIMEOUT

# Direct board HTTP read access — lets the assistant list/read tickets from
# the SAME HTTP endpoint the browser UI uses (read parity with the user — no
# broker indirection, no NL reinterpretation). Disabled by default; independent
# of mill.enabled (works over HTTP even when the broker is offline).
board_reader:
  enabled: false                   # env override: BOARD_READER_ENABLED
  # api_base_url: http://127.0.0.1:8077  # board API base URL; env: BOARD_READER_API_BASE_URL
  # api_token: ""                  # bearer token (empty = no auth); env: BOARD_READER_API_TOKEN
  # timeout: 30.0                  # per-request HTTP seconds; env: BOARD_READER_TIMEOUT
