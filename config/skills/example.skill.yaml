# Example skill manifest — copy and customise for each broker.
#
# This file demonstrates the manifest format.  It is disabled by default
# and produces no tools.  To activate a skill, set `enabled: true` and
# configure the broker connection.
#
# Each manifest declares:
#   - A broker target (which agent to talk to)
#   - A set of capabilities (what the agent can do)
#   - Per-capability parameter schemas (what the LLM passes)

skill_id: example
display_name: "Example Skill (disabled)"
enabled: false

broker:
  target_agent_id: "example-agent"
  agent_id: "robotsix-chat"
  host: ai-broker.robotsix.net
  port: 443
  scheme: https
  token: "${EXAMPLE_BROKER_TOKEN}"
  timeout: 240.0

capabilities:
  - name: query
    description: "Query the example agent with a natural-language request."
    parameters:
      request:
        type: string
        description: "The natural-language request to send."
        required: true

  - name: get_status
    description: "Get the current status of the example agent."
    parameters: {}
