name: Lint workflows

# Standalone guard, kept SEPARATE from ci.yml on purpose. A job that `uses:` a
# SARIF-uploading reusable workflow (python-ci.yml) must grant
# `security-events: write`, or GitHub rejects the WHOLE workflow file with a
# 0-second `startup_failure` (no job logs) — so a check living inside ci.yml
# could never run to catch it. This file has no such caller job, so it always
# runs. Mirrors robotsix-mill's scripts/validate_workflow_permissions.py
# (see robotsix-mill#1728).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  workflow-permissions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.14"
      - run: pip install "pyyaml>=6"
      - name: Validate workflow permissions
        run: |
          python - <<'PY'
          import pathlib, sys, yaml
          wfdir = pathlib.Path(".github/workflows")
          known = {"python-ci.yml"}  # only python-ci.yml uploads SARIF

          def load(p):
              try:
                  d = yaml.safe_load(p.read_text())
              except yaml.YAMLError as e:
                  print("::error::cannot parse %s: %s" % (p, e))
                  return {}
              return d if isinstance(d, dict) else {}

          def grants(pm):
              if pm == "write-all":
                  return True
              return isinstance(pm, dict) and pm.get("security-events") == "write"

          def basename(u):
              if ".github/workflows/" not in u:
                  return ""
              return u.split("@", 1)[0].rsplit("/", 1)[-1]

          required = set(known)
          for wf in wfdir.glob("*.y*ml"):
              for job in (load(wf).get("jobs") or {}).values():
                  if isinstance(job, dict) and grants(job.get("permissions")):
                      required.add(wf.name)

          problems = []
          for wf in sorted(wfdir.glob("*.y*ml")):
              data = load(wf)
              top = data.get("permissions")
              for name, job in (data.get("jobs") or {}).items():
                  if not isinstance(job, dict) or not isinstance(job.get("uses"), str):
                      continue
                  if basename(job["uses"]) not in required:
                      continue
                  eff = job["permissions"] if "permissions" in job else top
                  if not grants(eff):
                      problems.append(
                          "%s: job '%s' calls %s without security-events: write"
                          % (wf, name, basename(job["uses"]))
                      )

          if problems:
              sys.stderr.write(
                  "Caller jobs missing security-events: write "
                  "(0-second startup_failure risk):\n"
              )
              for p in problems:
                  sys.stderr.write("  - %s\n" % p)
              sys.exit(1)
          print("workflow permissions OK")
          PY

  actionlint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Run actionlint
        uses: reviewdog/action-actionlint@f00ad0691526c10be4021a91b2510f0a769b14d0  # v1.68.0
        with:
          reporter: github-pr-review
          level: error

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
      - name: Run zizmor
        run: uvx zizmor --format sarif . > results.sarif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        if: always()
        with:
          sarif_file: results.sarif
          category: zizmor
