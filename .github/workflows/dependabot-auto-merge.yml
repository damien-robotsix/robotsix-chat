name: Dependabot auto-merge

on:
  pull_request:

# Workflow-level: start with no permissions; the job requests exactly
# what it needs (contents: write for merge commits, pull-requests: write
# for auto-merge via the shared reusable workflow).
permissions: {}

concurrency:
  group: dependabot-auto-merge-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  auto-merge:
    name: Auto-merge Dependabot PRs
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write       # merge commits require pushing to the PR branch
      pull-requests: write  # auto-merge approval and merge
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/dependabot-auto-merge.yml@9ea2955d11f3d595a7a812feff99ae0eea8240c1  # main
