name: Release image

# Publishes container images to GHCR via the shared docker-release workflow
# in robotsix-mill.  Triggers: push to main, push of semver tags, manual dispatch.
# See deploy/README.md for how the server consumes the `main` tag via Watchtower.
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Verify CI status
        uses: actions/github-script@v7
        with:
          script: |
            const POLL_MS = 15000;
            const MAX_ATTEMPTS = 80; // ~20 min
            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              const { data } = await github.rest.checks.listForRef({
                ...context.repo,
                ref: context.sha,
                check_name: 'check',
              });
              const run = data.check_runs[0];
              if (run && run.status === 'completed') {
                if (run.conclusion === 'success') {
                  core.info(`Aggregate CI check succeeded for ${context.sha}`);
                  return;
                }
                core.setFailed(`CI aggregate check concluded '${run.conclusion}'`);
                return;
              }
              core.info(`Aggregate CI check not complete yet (attempt ${attempt}/${MAX_ATTEMPTS}); waiting...`);
              await new Promise(r => setTimeout(r, POLL_MS));
            }
            const { data: allChecks } = await github.rest.checks.listForRef({
              ...context.repo,
              ref: context.sha,
            });
            core.info('Check runs found on timeout:');
            for (const r of allChecks.check_runs) {
              core.info(`  ${r.name}: status=${r.status} conclusion=${r.conclusion}`);
            }
            core.setFailed('Timed out waiting for the aggregate CI check to complete');

  docker:
    needs: verify
    uses: damien-robotsix/robotsix-mill/.github/workflows/docker-release.yml@main
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
