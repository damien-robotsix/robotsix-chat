name: Release image

# Publishes container images to GHCR via the shared docker-release workflow
# in robotsix-mill.  Triggers: push to main, push of semver tags, manual dispatch.
# See deploy/README.md for how the server consumes the `main` tag via Watchtower.
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Verify CI status
        uses: actions/github-script@v7
        with:
          script: |
            const selfRun = `/runs/${context.runId}/`;
            const isSelf = (r) => (r.details_url || '').includes(selfRun);
            const deadlineMs = 20 * 60 * 1000; // 20 minutes
            const start = Date.now();

            let others = [];
            while (true) {
              const runs = await github.paginate(github.rest.checks.listForRef, {
                ...context.repo,
                ref: context.sha,
                per_page: 100,
              });
              others = runs.filter((r) => !isSelf(r));
              const pending = others.filter((r) => r.status !== 'completed');
              if (others.length > 0 && pending.length === 0) break;
              if (Date.now() - start > deadlineMs) {
                core.setFailed(
                  `Timed out waiting for CI checks to complete: ${pending.map((r) => r.name).join(', ') || 'no checks found'}`
                );
                return;
              }
              await new Promise((res) => setTimeout(res, 15000));
            }

            const failed = others.filter(
              (r) => r.conclusion !== 'success' && r.conclusion !== 'skipped'
            );
            if (failed.length > 0) {
              core.setFailed(
                `CI checks have not passed for this commit: ${failed.map((r) => `${r.name}=${r.conclusion}`).join(', ')}`
              );
            }

  docker:
    needs: verify
    uses: damien-robotsix/robotsix-mill/.github/workflows/docker-release.yml@main
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
