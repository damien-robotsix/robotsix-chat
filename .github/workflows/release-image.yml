name: Release image

# Publishes container images to GHCR via the shared docker-release workflow
# in robotsix-mill.  Triggers: push to main, push of semver tags, manual dispatch.
# See deploy/README.md for how the server consumes the `main` tag via Watchtower.
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Verify CI status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const fn = require('./.github/scripts/verify-ci.js');
            await fn({github, context, core});

  docker:
    needs: verify
    uses: damien-robotsix/robotsix-mill/.github/workflows/docker-release.yml@84de006ddcaee4926124edd588c0eaf06d7a61ec  # main
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
