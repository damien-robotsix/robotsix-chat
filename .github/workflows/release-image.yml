name: Release image

# Publishes container images to GHCR via the shared docker-release workflow
# in robotsix-mill.  Triggers: push to main, push of semver tags, manual dispatch.
# See deploy/README.md for how the server consumes the `main` tag via Watchtower.
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    uses: damien-robotsix/robotsix-mill/.github/workflows/docker-release.yml@e98512f56b071b3cac5ffa228f490504364ec26e  # v0.2.0
    permissions:
      contents: read
      packages: write
