name: Release image

# Publishes container images to GHCR via the shared docker-release workflow
# in robotsix-mill.  Triggers: push to main, push of semver tags, manual dispatch.
# See deploy/README.md for how the server consumes the `main` tag via Watchtower.
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Verify CI status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              ...context.repo,
              ref: context.sha,
            });
            const allGreen = checks.check_runs.every(
              r => r.conclusion === 'success' || r.conclusion === 'skipped'
            );
            if (!allGreen) {
              core.setFailed('CI checks have not passed for this commit');
            }

  docker:
    needs: verify
    uses: damien-robotsix/robotsix-mill/.github/workflows/docker-release.yml@main
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
