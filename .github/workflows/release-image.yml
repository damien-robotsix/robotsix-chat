name: Release image

# Publishes the container image to GHCR via the fleet's shared reusable
# workflow (docker standard: no hand-rolled build/push). The shared workflow
# handles metadata/tags (main, sha-<short>, X.Y.Z — no `latest`), SBOM +
# provenance attestation, and a Trivy publish gate (fixable CRITICAL findings
# block). central-deploy pulls the `main` tag on operator-triggered updates
# (see deploy/README.md).
on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read  # baseline: checkout the repo

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: never publish an image from a commit whose CI is red.
  verify:
    name: Verify CI is green
    runs-on: ubuntu-latest
    permissions:
      checks: read    # query CI check-run status
      contents: read  # checkout the repo
      actions: read   # getWorkflowRun for check-suite id
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Verify CI status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const fn = require('./.github/scripts/verify-ci.js');
            await fn({github, context, core});

  publish:
    name: Build, scan, and publish image
    needs: verify
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/docker-release.yml@0234f4b82365d776fc021c774dc104c5e7042c29  # main
    permissions:
      contents: read          # checkout the repo
      packages: write         # push image to GHCR
      attestations: write     # provenance / SBOM attestation
      id-token: write         # provenance / SBOM attestation signing
      security-events: write  # Trivy SARIF upload to Code Scanning
