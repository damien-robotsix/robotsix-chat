name: Auto Release

# Shared towncrier-driven 0.x release workflow (repo baseline): when
# changelog.d/ has fragments, it derives the bump, builds CHANGELOG.md,
# bumps pyproject.toml, and pushes the v* tag (which triggers
# release-image.yml).
on:
  schedule:
    - cron: "0 9 * * 1"  # every Monday at 09:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  release:
    permissions:
      contents: write       # push release commit + v* tag (or release branch)
      pull-requests: write  # open the fallback release PR with auto-merge
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/auto-release.yml@0234f4b82365d776fc021c774dc104c5e7042c29  # main
    # Authenticates as the fleet GitHub App — the installation token is
    # minted inside the reusable workflow; no PAT to rotate.
    with:
      app-id: ${{ vars.RELEASE_APP_ID }}
    secrets:
      app-private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
