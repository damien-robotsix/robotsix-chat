name: Docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read  # baseline: checkout the repo; job overrides for gh-pages push

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  docs:
    name: Build and deploy docs
    # python-docs.yml's nested job pushes the built site to gh-pages, so it
    # requests `contents: write`. The caller must grant it or GitHub rejects
    # the reusable-workflow call with a startup_failure.
    permissions:
      contents: write
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-docs.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
