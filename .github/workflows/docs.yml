name: Docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read  # baseline: checkout the repo; job overrides for gh-pages push

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  docs:
    name: Build and deploy docs
    # python-docs.yml's nested job pushes the built site to gh-pages, so it
    # requests `contents: write`. The caller must grant it or GitHub rejects
    # the reusable-workflow call with a startup_failure.
    permissions:
      contents: write  # push built site to gh-pages
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-docs.yml@44f210c7429969be62eb8cc4f53bfbd3b744da16  # main
