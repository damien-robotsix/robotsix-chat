name: Docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read  # baseline: checkout the repo; the deploy job needs more

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.14'
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: '0.8.15'
      - name: Install docs dependencies
        run: uv sync --group docs
      - name: Build mkdocs site
        run: uv run mkdocs build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202633d4a3c0cc3cd70f54e0cb4e7  # v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write    # deploy the built site to GitHub Pages
      id-token: write  # OIDC token for the Pages deployment
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true  # "Deployment failed, try again later." is a transient
                                 # Pages infra error, not an action bug; when it occurs
                                 # the deploy job succeeds after a manual re-run.
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v4
