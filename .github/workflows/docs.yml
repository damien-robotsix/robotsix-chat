name: Docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read  # baseline: checkout the repo; the deploy job needs more

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Install docs dependencies
        run: uv sync --frozen --group docs
      - name: Build mkdocs site
        run: uv run mkdocs build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write    # deploy the built site to GitHub Pages
      id-token: write  # OIDC token for the Pages deployment
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true  # "Deployment failed, try again later." is a transient
                                 # Pages infra error, not an action bug; when it occurs
                                 # the deploy job succeeds after a manual re-run.
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
