name: Docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read  # baseline: checkout the repo; the deploy job needs more

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  docs:
    name: Build and deploy docs
    # python-docs.yml deploys via the GitHub Pages actions (build_type
    # "workflow"), so its nested deploy job requests `pages: write` +
    # `id-token: write`. The caller must grant them or GitHub rejects the
    # reusable-workflow call with a startup_failure.
    # The github-pages environment is restricted to the main branch;
    # skip the entire job on PR events to avoid deploy failures.
    if: github.event_name != 'pull_request'
    # The shared workflow's nested deploy job uses the github-pages
    # environment (actions/deploy-pages).  GitHub requires the caller
    # to declare any environment that a reusable-workflow job uses,
    # otherwise the deployment is rejected.
    environment:
      name: github-pages
    permissions:
      contents: read  # checkout the repo
      pages: write    # deploy the built site to GitHub Pages
      id-token: write  # OIDC token for the Pages deployment
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-docs.yml@44f210c7429969be62eb8cc4f53bfbd3b744da16  # main
