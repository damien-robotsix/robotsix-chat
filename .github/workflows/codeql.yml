name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '30 2 * * 1'  # weekly on Monday at 02:30 UTC

permissions:
  actions: read          # CodeQL analysis
  contents: read         # checkout the repo

jobs:
  codeql:
    name: CodeQL analysis (shared)
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/codeql.yml@43309967ea8011400212a8995d33ca900ee2afed  # main
    with:
      languages: python
      config-file: ./.github/codeql-config.yml
    permissions:
      actions: read          # CodeQL analysis
      contents: read         # checkout the repo
      security-events: write  # upload SARIF results
