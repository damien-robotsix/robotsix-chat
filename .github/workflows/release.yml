name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Verify tag matches pyproject.toml version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "${TAG#v}" != "$version" ]; then
            echo "::error::release tag '$TAG' does not match pyproject version '$version'"
            exit 1
          fi
          if ! grep -qE "^## \[?$version\]?" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$version]' section for version '$version'"
            exit 1
          fi
      - name: Verify CI status
        uses: actions/github-script@v7
        with:
          script: |
            const POLL_MS = 15000;
            const MAX_ATTEMPTS = 80; // ~20 min
            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              const { data } = await github.rest.checks.listForRef({
                ...context.repo,
                ref: context.sha,
                check_name: 'check',
              });
              const run = data.check_runs[0];
              if (run && run.status === 'completed') {
                if (run.conclusion === 'success') {
                  core.info(`Aggregate CI check succeeded for ${context.sha}`);
                  return;
                }
                core.setFailed(`CI aggregate check concluded '${run.conclusion}'`);
                return;
              }
              core.info(`Aggregate CI check not complete yet (attempt ${attempt}/${MAX_ATTEMPTS}); waiting...`);
              await new Promise(r => setTimeout(r, POLL_MS));
            }
            const { data: allChecks } = await github.rest.checks.listForRef({
              ...context.repo,
              ref: context.sha,
            });
            core.info('Check runs found on timeout:');
            for (const r of allChecks.check_runs) {
              core.info(`  ${r.name}: status=${r.status} conclusion=${r.conclusion}`);
            }
            core.setFailed('Timed out waiting for the aggregate CI check to complete');

  publish:
    needs: verify
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-release.yml@main
    permissions:
      id-token: write
