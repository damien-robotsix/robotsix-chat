name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Verify tag matches pyproject.toml version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "${TAG#v}" != "$version" ]; then
            echo "::error::release tag '$TAG' does not match pyproject version '$version'"
            exit 1
          fi
          if ! grep -qE "^## \[?$version\]?" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$version]' section for version '$version'"
            exit 1
          fi
      - name: Verify CI status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            const fn = require('./.github/scripts/verify-ci.js');
            await fn({github, context, core});

  sbom:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - name: Generate CycloneDX SBOM
        run: uv export --format cyclonedx1.5 --frozen -o sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom.cdx.json
          path: sbom.cdx.json

      - name: Submit SBOM to Dependency Graph
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: ./
          format: cyclonedx-json
          dependency-snapshot: true

  publish:
    needs: verify
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-release.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    permissions:
      id-token: write
