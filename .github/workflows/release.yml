name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Verify tag matches pyproject.toml version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "${TAG#v}" != "$version" ]; then
            echo "::error::release tag '$TAG' does not match pyproject version '$version'"
            exit 1
          fi
          if ! grep -qE "^## \[?$version\]?" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$version]' section for version '$version'"
            exit 1
          fi
      - name: Verify CI status
        uses: actions/github-script@v7
        with:
          script: |
            const selfRun = `/runs/${context.runId}/`;
            const isSelf = (r) => (r.details_url || '').includes(selfRun);
            const deadlineMs = 20 * 60 * 1000; // 20 minutes
            const start = Date.now();

            let others = [];
            while (true) {
              const runs = await github.paginate(github.rest.checks.listForRef, {
                ...context.repo,
                ref: context.sha,
                per_page: 100,
              });
              others = runs.filter((r) => !isSelf(r));
              const pending = others.filter((r) => r.status !== 'completed');
              if (others.length > 0 && pending.length === 0) break;
              if (Date.now() - start > deadlineMs) {
                core.setFailed(
                  `Timed out waiting for CI checks to complete: ${pending.map((r) => r.name).join(', ') || 'no checks found'}`
                );
                return;
              }
              await new Promise((res) => setTimeout(res, 15000));
            }

            const failed = others.filter(
              (r) => r.conclusion !== 'success' && r.conclusion !== 'skipped'
            );
            if (failed.length > 0) {
              core.setFailed(
                `CI checks have not passed for this commit: ${failed.map((r) => `${r.name}=${r.conclusion}`).join(', ')}`
              );
            }

  publish:
    needs: verify
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-release.yml@main
    permissions:
      id-token: write
