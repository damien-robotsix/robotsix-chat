name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
      - name: Check lockfile freshness
        run: uv lock --check

  ci:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@84de006ddcaee4926124edd588c0eaf06d7a61ec  # main
    with:
      python-version: "3.14"
      cov-package: "robotsix_chat"
      install-extras: ""
      coverage-threshold: "60"
    # python-ci.yml's nested `tests` job uploads SARIF, so it requests
    # `security-events: write`. A caller job MUST grant at least that or
    # GitHub rejects the reusable-workflow call with a startup_failure
    # ("nested job 'tests' is requesting 'security-events: write'").
    permissions:
      contents: read
      security-events: write

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        with:
          languages: python
          queries: security-and-quality
          config-file: .github/codeql-config.yml
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3

  security:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-security.yml@84de006ddcaee4926124edd588c0eaf06d7a61ec  # main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"
    permissions:
      contents: read

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
      - name: Check for newsfragment
        run: uv run --with towncrier towncrier check --compare-with origin/${{ github.base_ref }}

  deptry:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
      - name: Run deptry
        run: uv run --with deptry deptry .

  check:
    needs: [lockfile, ci, codeql, security, deptry]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed"
