name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read  # baseline: checkout the repo, nothing else

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lockfile:
    name: Lockfile and audit
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Check lockfile freshness
        run: uv lock --check
      - name: Audit dependencies
        # CVE-2025-69872 / GHSA-w8v5-vhqr-4h9v: diskcache unsafe pickle deserialization.
        # No fix version available; ignored until a patched release is published.
        run: uv audit --ignore-until-fixed GHSA-w8v5-vhqr-4h9v

  ci:
    name: Python CI (shared)
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    with:
      python-version: "3.14"
      cov-package: "robotsix_chat"
      install-extras: ""
      # Keep in sync with [tool.coverage.report] fail_under in pyproject.toml
      # (the fleet floor is 80; never lower).
      coverage-threshold: "88"
    # python-ci.yml's nested `tests` job uploads SARIF, so it requests
    # `security-events: write`. A caller job MUST grant at least that or
    # GitHub rejects the reusable-workflow call with a startup_failure
    # ("nested job 'tests' is requesting 'security-events: write'").
    permissions:
      contents: read         # checkout the repo
      security-events: write  # required by python-ci.yml's nested `tests` job for SARIF upload

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read       # CodeQL needs to read workflow metadata
      contents: read      # checkout the repo
      security-events: write  # upload SARIF results
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: python
          queries: security-and-quality
          config-file: .github/codeql-config.yml
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2

  security:
    name: Security scan (shared)
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-security.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"
    permissions:
      contents: read  # the shared workflow checks out inside its own job

  changelog:
    name: Changelog fragment check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
    permissions:
      contents: read  # checkout the repo with full history
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Check for newsfragment
        env:
          BASE_REF: ${{ github.base_ref }}
        run: uv run --with towncrier towncrier check --compare-with "origin/${BASE_REF}"

  deptry:
    name: Dependency hygiene (deptry)
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Run deptry
        run: uv run --with deptry deptry .

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Run pre-commit
        # mypy resolves from the project's dev group via `uv run`; vulture is
        # not a declared dependency (only a system-hook tool), so provision it
        # — and the pre-commit runner — explicitly with `--with`.
        run: uv run --with pre-commit --with vulture pre-commit run --all-files --show-diff-on-failure

  check-sse-types:
    name: SSE event type audit
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Run SSE event-type check
        run: python scripts/check_sse_event_types.py

  check-modules-registry:
    name: Modules registry audit
    # Repo-baseline standard: every file registered in docs/modules.yaml;
    # drift (unregistered/stale/duplicate paths) fails CI.
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
      - run: pip install "pyyaml>=6"
      - name: Check modules.yaml against the tracked tree
        run: python scripts/check_modules_registry.py

  image-scan:
    name: Container image scan (Trivy)
    # Standards gate: build the container image on every PR and Trivy-scan it,
    # so vulnerable base images/dependencies surface before merge (see
    # robotsix-standards docker-standard "CI-time image scan").
    runs-on: ubuntu-latest
    permissions:
      contents: read         # checkout the repo
      security-events: write  # upload Trivy SARIF to Code Scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - name: Build image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: robotsix-chat:ci-scan
          # No GHA layer cache on purpose: exporting this multi-GB image's
          # layers to the cache API took 45-55 min per run, while a cold
          # build takes ~4 min. Measured 2026-07-03; do not re-add without
          # timing it.
      # Gate policy (docker standard): block only on CRITICAL/HIGH findings
      # with a released fix — a red gate always means "an upgrade exists,
      # take it". Unfixable base-image CVEs stay visible via the SARIF run
      # below and the weekly rescan but do not block PRs.
      # Two steps on purpose (mirrors the shared docker-release.yml): the
      # trivy-action unsets TRIVY_SEVERITY when format=sarif, and SARIF mode
      # swallows the findings table — so the gate runs in table format and a
      # separate no-exit-code SARIF run feeds Code Scanning.
      - name: Trivy scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: robotsix-chat:ci-scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          vuln-type: os,library
      - name: Trivy scan (SARIF for code-scanning)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: robotsix-chat:ci-scan
          format: sarif
          output: trivy-ci-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        if: always()
        with:
          sarif_file: trivy-ci-results.sarif
          category: trivy-ci

  check-config-schema:
    name: Config schema sync
    runs-on: ubuntu-latest
    needs: []
    permissions:
      contents: read  # checkout the repo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v7.0.0
        with:
          version: "0.8.15"
      - name: Install
        run: uv sync --frozen
      - name: Verify config/config.schema.json in sync
        run: |
          python - <<'EOF'
          import json, sys
          from robotsix_chat.config import Settings
          live = Settings.model_json_schema()
          committed = json.loads(open("config/config.schema.json").read())
          if live != committed:
              print("ERROR: config/config.schema.json is out of sync.")
              print("Regenerate:")
              print("  python -c 'import json; from robotsix_chat.config import Settings; "
                    "print(json.dumps(Settings.model_json_schema(), indent=2))' > config/config.schema.json")
              sys.exit(1)
          EOF

  check:
    name: All CI checks passed
    needs: [lockfile, ci, codeql, security, deptry, pre-commit, check-sse-types, check-modules-registry, image-scan, check-config-schema]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed"
