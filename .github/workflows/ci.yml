name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Check lockfile freshness
        run: uv lock --check
      - name: Audit dependencies
        run: uv audit

  ci:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    with:
      python-version: "3.14"
      cov-package: "robotsix_chat"
      install-extras: ""
      coverage-threshold: "60"
    # python-ci.yml's nested `tests` job uploads SARIF, so it requests
    # `security-events: write`. A caller job MUST grant at least that or
    # GitHub rejects the reusable-workflow call with a startup_failure
    # ("nested job 'tests' is requesting 'security-events: write'").
    permissions:
      contents: read
      security-events: write

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: python
          queries: security-and-quality
          config-file: .github/codeql-config.yml
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2

  security:
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-security.yml@5cd8c1facb02299da618979e7a55f1953f9c075a  # main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"
    permissions:
      contents: read

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Check for newsfragment
        env:
          BASE_REF: ${{ github.base_ref }}
        run: uv run --with towncrier towncrier check --compare-with "origin/${BASE_REF}"

  deptry:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Run deptry
        run: uv run --with deptry deptry .

  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Run pre-commit
        # mypy resolves from the project's dev group via `uv run`; vulture is
        # not a declared dependency (only a system-hook tool), so provision it
        # — and the pre-commit runner — explicitly with `--with`.
        run: uv run --with pre-commit --with vulture pre-commit run --all-files --show-diff-on-failure

  check-sse-types:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Run SSE event-type check
        run: python scripts/check_sse_event_types.py

  check:
    needs: [lockfile, ci, codeql, security, deptry, pre-commit, check-sse-types]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed"
