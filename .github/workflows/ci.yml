name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read  # baseline: checkout the repo, nothing else

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lockfile:
    name: Lockfile and audit
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Check lockfile freshness
        run: uv lock --check
      - name: Audit dependencies
        # CVE-2025-69872 / GHSA-w8v5-vhqr-4h9v: diskcache unsafe pickle deserialization.
        # No fix version available; ignored until a patched release is published.
        # --preview-features audit-command: uv ≥0.12 requires the flag; older
        # versions accept it without error, so this is safe to pass always.
        run: uv --preview-features audit-command audit --ignore-until-fixed GHSA-w8v5-vhqr-4h9v

  ci:
    name: Python CI (shared)
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-ci.yml@0234f4b82365d776fc021c774dc104c5e7042c29  # main
    with:
      python-version: "3.14"
      cov-package: "robotsix_chat"
      install-extras: ""
      # coverage-threshold deliberately omitted: the fleet-wide floor (80)
      # lives in the shared workflow — no per-repo threshold (repo baseline).
      # The CVE audit runs in the `lockfile` job instead, which carries the
      # curated --ignore-until-fixed list for unfixable advisories; the
      # shared audit step has no ignore mechanism, so running both would
      # hard-block CI on CVEs with no released fix.
      run-audit: false
    # python-ci.yml's nested `tests` job uploads SARIF, so it requests
    # `security-events: write`. A caller job MUST grant at least that or
    # GitHub rejects the reusable-workflow call with a startup_failure
    # ("nested job 'tests' is requesting 'security-events: write'").
    permissions:
      contents: read         # checkout the repo
      security-events: write  # required by python-ci.yml's nested `tests` job for SARIF upload

  security:
    name: Security scan (shared)
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/python-security.yml@0234f4b82365d776fc021c774dc104c5e7042c29  # main
    with:
      install-extras: ""
      trufflehog-pr-diff: true
      trufflehog-extra-args: "--results=verified,unknown"
    permissions:
      contents: read          # checkout the repo
      security-events: write  # required by python-security.yml's nested jobs for SARIF upload

  changelog:
    name: Changelog fragment check
    # Shared reusable gate (repo baseline); the skip-changelog label
    # exemption is handled inside the reusable workflow.
    if: github.event_name == 'pull_request'
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/changelog-check.yml@0234f4b82365d776fc021c774dc104c5e7042c29  # main
    permissions:
      contents: read  # checkout the repo with full history

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Install
        run: uv sync --frozen
        env:
          UV_MALWARE_CHECK: "1"
      - name: Run pre-commit
        # mypy resolves from the project's dev group via `uv run`; vulture is
        # not a declared dependency (only a system-hook tool), so provision it
        # — and the pre-commit runner — explicitly with `--with`.
        run: uv run --frozen --with pre-commit --with vulture --with pyright pre-commit run --all-files --show-diff-on-failure

  check-sse-types:
    name: SSE event type audit
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Run SSE event-type check
        run: python scripts/check_sse_event_types.py

  check-subsession-kinds:
    name: SubsessionKind audit
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Run SubsessionKind check
        run: python scripts/check_subsession_kinds.py

  check-activity-kinds:
    name: ActivityKind audit
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Run ActivityKind check
        run: python scripts/check_activity_kinds.py

  # docs/modules.yaml drift is gated by the shared baseline-check workflow
  # (has-board: true → robotsix-modules validate / check-registration /
  # validate-paths) — see .github/workflows/baseline-check.yml.

  image-scan:
    name: Container image scan (Trivy)
    # Standards gate: build the container image on every PR and Trivy-scan it,
    # so vulnerable base images/dependencies surface before merge (see
    # robotsix-standards docker-standard "CI-time image scan").
    runs-on: ubuntu-latest
    permissions:
      contents: read         # checkout the repo
      security-events: write  # upload Trivy SARIF to Code Scanning
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: Build image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: robotsix-chat:ci-scan
          # No GHA layer cache on purpose: exporting this multi-GB image's
          # layers to the cache API took 45-55 min per run, while a cold
          # build takes ~4 min. Measured 2026-07-03; do not re-add without
          # timing it.
      # Gate policy (docker standard): block only on CRITICAL/HIGH findings
      # with a released fix — a red gate always means "an upgrade exists,
      # take it". Unfixable base-image CVEs stay visible via the SARIF run
      # below and the weekly rescan but do not block PRs.
      # Two steps on purpose (mirrors the shared docker-release.yml): the
      # trivy-action unsets TRIVY_SEVERITY when format=sarif, and SARIF mode
      # swallows the findings table — so the gate runs in table format and a
      # separate no-exit-code SARIF run feeds Code Scanning.
      - name: Trivy scan (gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: robotsix-chat:ci-scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          vuln-type: os,library
      - name: Trivy scan (SARIF for code-scanning)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: robotsix-chat:ci-scan
          format: sarif
          output: trivy-ci-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4.37.1
        if: always()
        with:
          sarif_file: trivy-ci-results.sarif
          category: trivy-ci

  check-config-schema:
    name: Config schema sync
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Install
        run: uv sync --frozen
        env:
          UV_MALWARE_CHECK: "1"
      - name: Verify config/config.schema.json in sync
        run: |
          uv run python - <<'EOF'
          import json, sys
          from robotsix_chat.config import Settings
          live = Settings.model_json_schema()
          committed = json.loads(open("config/config.schema.json").read())
          if live != committed:
              print("ERROR: config/config.schema.json is out of sync.")
              print("Regenerate:")
              print("  python -c 'import json; from robotsix_chat.config import Settings; "
                    "print(json.dumps(Settings.model_json_schema(), indent=2))' > config/config.schema.json")
              sys.exit(1)
          EOF

  deptry:
    name: Dependency hygiene (deptry)
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Install
        run: uv sync --frozen
        env:
          UV_MALWARE_CHECK: "1"
      - name: Run deptry
        run: uv run deptry src/ --known-first-party robotsix_chat

  pyright:
    name: Pyright type checker
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout the repo
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Install
        run: uv sync --frozen
        env:
          UV_MALWARE_CHECK: "1"
      - name: Run pyright
        run: uv run --with pyright pyright src/ tests/

  check:
    name: All CI checks passed
    needs: [lockfile, ci, security, pre-commit, check-sse-types, check-subsession-kinds, check-activity-kinds, image-scan, check-config-schema, deptry, pyright]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed"
