name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  ci:
    uses: damien-robotsix/robotsix-mill/.github/workflows/python-ci.yml@1a8598323f1dad0984f98393080080e6751f942f
    with:
      python-version: "3.12"
      cov-package: "robotsix_chat"
      install-extras: ""
      pytest-args: ""
      coverage-threshold: "60"
      mypy-advisory: false
    secrets: inherit
