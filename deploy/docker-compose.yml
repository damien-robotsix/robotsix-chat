# central-deploy-contract-version: 1
#
# Production deployment via robotsix-central-deploy (the contract this file
# follows: https://robotsix.net/central-deploy/DEPLOY_CONTRACT/). The root
# docker-compose.yml is the local-dev stack and is ignored by the deployment
# system. Lifecycle (restart policy, networking, gateway routing, redeploys)
# is managed by central-deploy — no Watchtower, no restart:, no host binds.
#
# Configuration is currently env-based (empty value = operator-filled secret
# slot, non-empty = editable default). The one-file robotsix-config migration
# (config/config.json + config-target label) is planned and will replace most
# of these environment keys.
services:
  robotsix-chat:
    image: ghcr.io/damien-robotsix/robotsix-chat:main
    labels:
      # Subscription auth for the level-3 claude-sdk transport: central-deploy
      # binds host ~/.claude -> /home/app/.claude (the standardized container
      # user's home).
      robotsix.deploy.claude-mount: "true"
    ports:
      - "8088:8080"
    environment:
      # LLM capability level (robotsix-llmio): 3 = claude-sdk/opus, keyless
      # via the claude-mount above; 1-2 = OpenRouter (needs LLMIO_API_KEY).
      LLMIO_MODEL_LEVEL: "3"
      LLMIO_API_KEY: ""
      # HTTP Basic auth gate for the UI and /chat.
      AUTH_ENABLED: "1"
      AUTH_USERNAME: admin
      AUTH_PASSWORD: ""
      # Long-term memory (cognee). Needs the embedding endpoint + OpenRouter
      # key when enabled; stores live under the chat-data volume.
      MEMORY_ENABLED: "0"
      MEMORY_DATA_DIR: .data/cognee
      MEMORY_LLM_API_KEY: ""
      MEMORY_EMBEDDING_ENDPOINT: ""
      MEMORY_EMBEDDING_API_KEY: ""
      # Agent-comm broker integrations (mill board manager, calendar agent).
      MILL_ENABLED: "0"
      MILL_BROKER_TOKEN: ""
      CALENDAR_ENABLED: "0"
      CALENDAR_BROKER_TOKEN: ""
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      # Persistent agent state (knowledge store, cognee memory, HF cache).
      - chat-data:/home/app/.data

volumes:
  chat-data:
    labels:
      robotsix.deploy.stateful: "true"
