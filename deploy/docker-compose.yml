services:
  chat:
    image: ghcr.io/damien-robotsix/robotsix-chat:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CHAT_PORT:-8088}:8080"
    volumes:
      - ./config:/home/appuser/config
      # Persistent agent data (e.g. memory) — survives container redeploys.
      # Host ./data resolves to deploy/data; mounted read-write so the
      # container (appuser, uid 1001) can write to it.
      - ./data:/home/appuser/.data
      - ~/.claude:/home/appuser/.claude:ro
    environment:
      CHAT_CONFIG_PATH: config/chat.local.yaml
      LLMIO_MODEL_LEVEL: "3"
      AUTH_ENABLED: "1"
      AUTH_PASSWORD: ${CHAT_AUTH_PASSWORD:?err}
      # Long-term memory (cognee). Disabled unless MEMORY_ENABLED=1 in deploy/.env
      # with a reachable embedding endpoint + OpenRouter key. Stores live under
      # the ./data mount (MEMORY_DATA_DIR is relative to the container WORKDIR).
      MEMORY_ENABLED: ${MEMORY_ENABLED:-0}
      MEMORY_DATA_DIR: .data/cognee
      MEMORY_LLM_API_KEY: ${MEMORY_LLM_API_KEY:-}
      MEMORY_EMBEDDING_ENDPOINT: ${MEMORY_EMBEDDING_ENDPOINT:-}
      MEMORY_EMBEDDING_API_KEY: ${MEMORY_EMBEDDING_API_KEY:-}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Poll interval (seconds) for new GHCR images. Default 3600 (1h) to keep
    # container restarts — and the brief 502 they cause behind the proxy —
    # infrequent. Override via WATCHTOWER_POLL_INTERVAL in deploy/.env.
    command: --interval ${WATCHTOWER_POLL_INTERVAL:-3600} --label-enable --cleanup
