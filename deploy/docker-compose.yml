# central-deploy-contract-version: 1
#
# Production deployment via robotsix-central-deploy (the contract this file
# follows: https://robotsix.net/central-deploy/DEPLOY_CONTRACT/). The root
# docker-compose.yml is the local-dev stack and is ignored by the deployment
# system. Lifecycle (restart policy, networking, gateway routing, redeploys)
# is managed by central-deploy — no Watchtower, no restart:, no host binds.
# The image HEALTHCHECK is the canonical health probe; no compose-level
# override is declared.
#
# Application config and secrets live in the mounted config file:
# central-deploy merges operator edits into the committed template
# (config/config.json, typed by config/config.schema.json) and writes the
# result into the chat-config volume before the container starts (the
# config-target label below). The environment: block carries only
# infrastructure wiring — the config-file path pointer, never application
# behaviour.
services:
  robotsix-chat:
    image: ghcr.io/damien-robotsix/robotsix-chat:main
    labels:
      # Subscription auth for the claude-sdk transports (levels 3-4):
      # central-deploy mounts its managed `claude-auth` named volume at
      # /home/app/.claude (injected at deploy time — not listed under
      # volumes:). Authentication happens through central-deploy's
      # dashboard login flow; no host ~/.claude is involved.
      robotsix.deploy.claude-mount: "true"
      # Full in-container path of the config file (contract §5/§8): its
      # dirname must match the chat-config mount below; central-deploy
      # resolves the volume from it and writes config.json there on every
      # config save.
      robotsix.deploy.config-target: "/home/app/config/config.json"
    ports:
      - "8088:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      # Infrastructure wiring only — where the app finds the mounted config
      # file (written by central-deploy via the config-target label above).
      ROBOTSIX_CONFIG_FILE: /home/app/config/config.json
    volumes:
      # Operator-managed runtime config, written by central-deploy.
      - chat-config:/home/app/config
      # Persistent agent state (knowledge store, cognee memory, HF cache).
      - chat-data:/data

volumes:
  chat-config:
  chat-data:
    labels:
      robotsix.deploy.stateful: "true"
      robotsix.deploy.config-target: "/home/app/config/config.json"
